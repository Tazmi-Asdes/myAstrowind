site:
  name: MyBlog
  site: 'https://myblog.example.com'
  base: '/'
  trailingSlash: false

# Default SEO metadata
metadata:
  title:
    default: MyBlog
    template: '%s — MyBlog'
  description: 'Tazmi 的个人博客，记录项目实践与技术探索。'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: MyBlog
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    cardType: summary_large_image

i18n:
  language: zh
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'system'
